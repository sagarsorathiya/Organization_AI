# GPU override — use with: docker compose -f docker-compose.yml -f docker-compose.gpu.yml up -d
# Requires NVIDIA Container Toolkit: https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/install-guide.html

services:
  ollama:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      OLLAMA_NUM_PARALLEL: ${OLLAMA_NUM_PARALLEL:-16}
      OLLAMA_MAX_QUEUE: ${OLLAMA_MAX_QUEUE:-2048}
